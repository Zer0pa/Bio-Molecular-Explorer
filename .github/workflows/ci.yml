name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Generate cardiac packets (smoke)
        run: python scripts/generate_cardiac_packets.py

      - name: Health check
        run: python -m zer0pa_biomolecular_explorer.cli health-check

      - name: Runpod precheck
        run: python -m zer0pa_biomolecular_explorer.cli runpod-precheck
